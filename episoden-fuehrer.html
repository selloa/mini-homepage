<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MMM Episodenführer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0e12;
      --bg-elev: #18181f;
      --bg-card: #1f1f2a;
      --border: rgba(255, 255, 255, 0.08);
      --text: #ece9e4;
      --muted: #9c9690;
      --accent: #d4a853;
      --accent-dim: rgba(212, 168, 83, 0.2);
      --link: #8ec5ff;
      --danger: #f87171;
      --radius: 12px;
      --font: "DM Sans", system-ui, sans-serif;
      --font-display: "Fraunces", Georgia, serif;
    }

    * {
      box-sizing: border-box;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1120px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 4rem;
    }

    nav.home-nav {
      margin-bottom: 1rem;
    }

    nav.home-nav a {
      color: var(--link);
      text-decoration: none;
      font-size: 0.9rem;
    }

    nav.home-nav a:hover {
      text-decoration: underline;
      color: var(--accent);
    }

    header.hero {
      margin-bottom: 2rem;
      padding: 2rem 1.5rem;
      background: linear-gradient(145deg, var(--bg-elev) 0%, #12121a 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    header.hero h1 {
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 4vw, 2.35rem);
      font-weight: 600;
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    header.hero h1 span {
      color: var(--accent);
    }

    .intro {
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 42rem;
      margin: 0 0 1.25rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      max-width: 320px;
    }

    .search-wrap input {
      width: 100%;
      padding: 0.55rem 0.85rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font: inherit;
    }

    .search-wrap input::placeholder {
      color: var(--muted);
    }

    .search-wrap input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    button.btn {
      font: inherit;
      padding: 0.55rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      cursor: pointer;
    }

    button.btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .meta-bar {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.25rem;
    }

    .meta-bar a {
      color: var(--link);
      text-decoration: none;
    }

    .meta-bar a:hover {
      text-decoration: underline;
    }

    .loading,
    .error-box {
      padding: 1.25rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-elev);
      margin-bottom: 1.5rem;
    }

    .error-box {
      border-color: rgba(248, 113, 113, 0.4);
      color: var(--danger);
    }

    main#content {
      display: none;
    }

    main#content.visible {
      display: block;
    }

    .section-block {
      margin-bottom: 2.5rem;
      scroll-margin-top: 1rem;
    }

    .section-block h2 {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--accent-dim);
      color: var(--accent);
    }

    .subsection {
      margin-bottom: 1.5rem;
    }

    .subsection h3 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 0.65rem;
      color: var(--text);
    }

    .ep-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 0.65rem;
    }

    a.ep-card {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      padding: 0.65rem 0.85rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.15s;
    }

    a.ep-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    a.ep-card .num {
      flex-shrink: 0;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      min-width: 2.25rem;
    }

    a.ep-card .body {
      min-width: 0;
    }

    a.ep-card .label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.15rem;
    }

    a.ep-card .title {
      font-weight: 600;
      color: var(--link);
      word-break: break-word;
    }

    a.ep-card.hidden {
      display: none;
    }

    .toc {
      position: sticky;
      top: 0.75rem;
      z-index: 2;
      margin-bottom: 1.5rem;
      padding: 0.75rem 1rem;
      background: rgba(14, 14, 18, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-height: 40vh;
      overflow: auto;
    }

    .toc strong {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .toc a {
      display: inline-block;
      margin: 0.2rem 0.5rem 0.2rem 0;
      font-size: 0.85rem;
      color: var(--link);
      text-decoration: none;
    }

    .toc a:hover {
      text-decoration: underline;
      color: var(--accent);
    }

    @media (min-width: 900px) {
      .layout {
        display: grid;
        grid-template-columns: 200px 1fr;
        gap: 1.5rem;
        align-items: start;
      }

      .toc {
        max-height: calc(100vh - 2rem);
      }
    }
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="wrap">
    <nav class="home-nav"><a href="index.html">← Home</a></nav>
    <header class="hero">
      <h1><span>MMM</span> Episodenführer</h1>
      <p class="intro" id="intro">Lade Daten aus ManiacWiki …</p>
      <div class="toolbar">
        <div class="search-wrap">
          <label for="filter" class="visually-hidden">Suche</label>
          <input type="search" id="filter" placeholder="Episoden filtern …" autocomplete="off" disabled />
        </div>
        <button type="button" class="btn" id="reload" disabled>Neu laden</button>
      </div>
      <div class="meta-bar" id="meta-bar"></div>
    </header>

    <div class="loading" id="loading">Verbinde mit MediaWiki-API …</div>
    <div class="error-box" id="error" hidden></div>

    <div class="layout" id="layout" hidden>
      <nav class="toc" id="toc" aria-label="Sprungmarken"></nav>
      <main id="content"></main>
    </div>
  </div>

  <script>
    (function () {
      var WIKI_ORIGIN = "http://wiki.maniac-mansion-mania.de";
      var API = WIKI_ORIGIN + "/api.php";
      var PAGE_TITLE = "Episoden";
      /**
       * GitHub Pages (https) darf nicht per fetch auf http:// zugreifen (Mixed Content).
       * Das Wiki-Zertifikat für https passt nicht zum Hostnamen; direkter https-Aufruf scheitert im Browser.
       * In dem Fall: Anfrage über einen öffentlichen HTTPS-CORS-Proxy (nur API-Lesezugriff).
       */
      var CORS_PROXY_PREFIX = "https://corsproxy.io/?";

      function apiFetchUrl(searchParams) {
        var direct = API + "?" + searchParams.toString();
        if (location.protocol === "https:" && /^http:\/\//i.test(WIKI_ORIGIN)) {
          return CORS_PROXY_PREFIX + encodeURIComponent(direct);
        }
        return direct;
      }

      var el = {
        loading: document.getElementById("loading"),
        error: document.getElementById("error"),
        layout: document.getElementById("layout"),
        content: document.getElementById("content"),
        toc: document.getElementById("toc"),
        intro: document.getElementById("intro"),
        metaBar: document.getElementById("meta-bar"),
        filter: document.getElementById("filter"),
        reload: document.getElementById("reload"),
      };

      function wikiUrl(pageTitle) {
        var t = String(pageTitle).replace(/ /g, "_");
        return WIKI_ORIGIN + "/wiki/" + encodeURIComponent(t);
      }

      function slug(s) {
        return String(s)
          .toLowerCase()
          .replace(/ä/g, "ae")
          .replace(/ö/g, "oe")
          .replace(/ü/g, "ue")
          .replace(/ß/g, "ss")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "");
      }

      function parseWikiLinks(segment) {
        var links = [];
        var re = /\[\[([^|\]]+)(?:\|([^\]]+))?\]\]/g;
        var m;
        while ((m = re.exec(segment))) {
          links.push({ target: m[1].trim(), label: (m[2] || m[1]).trim() });
        }
        return links;
      }

      function stripWikiNoise(text) {
        return text
          .replace(/__NOTOC__/gi, "")
          .replace(/__NOTITLE__/gi, "")
          .replace(/__NOEDITSECTION__/gi, "")
          .trim();
      }

      /**
       * @returns {{ intro: string, blocks: Array<{ kind: string, title: string, subsections?: Array<{ title: string, items: Item[] }>, items?: Item[] }> }}
       */
      function parseEpisodenWikitext(raw) {
        var intro = "";
        var blocks = [];
        var currentSpecial = null;
        var staffelGroups = [];

        var lines = stripWikiNoise(raw).split("\n");
        var i;
        for (i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line) continue;
          if (/^\[\[Kategorie:/i.test(line)) continue;
          if (/^\{\|/.test(line)) continue;
          if (/^\|\}/.test(line)) continue;
          if (/^\|\s*valign=/i.test(line)) continue;
          if (/^\|\s*$/.test(line)) continue;

          var bold = line.match(/^'''(.+?)'''/);
          if (bold) {
            intro = bold[1].trim();
            continue;
          }

          var h2 = line.match(/^==(?!=)\s*(.+?)\s*==\s*$/);
          if (h2) {
            currentSpecial = { kind: "special", title: h2[1].trim(), subsections: [], items: [] };
            blocks.push(currentSpecial);
            continue;
          }

          var h3 = line.match(/^===(?!=)\s*(.+?)\s*===\s*$/);
          if (h3) {
            var sub = { title: h3[1].trim(), items: [] };
            if (currentSpecial) {
              currentSpecial.subsections.push(sub);
            } else {
              staffelGroups.push(sub);
            }
            continue;
          }

          var li = line.match(/^\*\s*(.*)$/);
          if (li) {
            var rest = li[1].trim();
            var links = parseWikiLinks(rest);
            var primary = links[0];
            if (!primary) continue;

            var epMatch = rest.match(/Episode\s+(\d+)\s*:/i);
            var num = epMatch ? epMatch[1] : "";

            var item = {
              num: num,
              label: rest.replace(/\[\[[^\]]+\]\]/g, "").replace(/\s+/g, " ").trim(),
              wikiTitle: primary.target,
              displayTitle: primary.label,
            };

            if (currentSpecial) {
              var subs = currentSpecial.subsections;
              if (subs.length) {
                subs[subs.length - 1].items.push(item);
              } else {
                currentSpecial.items.push(item);
              }
            } else if (staffelGroups.length) {
              staffelGroups[staffelGroups.length - 1].items.push(item);
            }
          }
        }

        if (staffelGroups.length) {
          blocks.unshift({
            kind: "staffeln",
            title: "Hauptserie",
            subsections: staffelGroups,
            items: [],
          });
        }

        return { intro: intro, blocks: blocks };
      }

      function render(data) {
        el.intro.textContent = data.intro || "Übersicht über Episoden und Specials (ManiacWiki).";
        el.content.innerHTML = "";
        el.toc.innerHTML = "<strong>Sprungmarke</strong>";

        data.blocks.forEach(function (block) {
          var bid = "block-" + slug(block.title);
          var sectionEl = document.createElement("section");
          sectionEl.className = "section-block";
          sectionEl.id = bid;

          var h2 = document.createElement("h2");
          h2.textContent = block.title;
          sectionEl.appendChild(h2);

          var tocLink = document.createElement("a");
          tocLink.href = "#" + bid;
          tocLink.textContent = block.title;
          el.toc.appendChild(tocLink);

          function renderItems(container, items) {
            var grid = document.createElement("div");
            grid.className = "ep-grid";
            items.forEach(function (it) {
              var a = document.createElement("a");
              a.className = "ep-card";
              a.href = wikiUrl(it.wikiTitle);
              a.target = "_blank";
              a.rel = "noopener noreferrer";
              a.dataset.filter =
                (it.num + " " + it.label + " " + it.displayTitle + " " + it.wikiTitle).toLowerCase();

              var num = document.createElement("span");
              num.className = "num";
              num.textContent = it.num ? "#" + it.num : "•";

              var body = document.createElement("div");
              body.className = "body";
              if (it.label && it.label.length > 0) {
                var lab = document.createElement("div");
                lab.className = "label";
                lab.textContent = it.label;
                body.appendChild(lab);
              }
              var tit = document.createElement("div");
              tit.className = "title";
              tit.textContent = it.displayTitle;
              body.appendChild(tit);

              a.appendChild(num);
              a.appendChild(body);
              grid.appendChild(a);
            });
            container.appendChild(grid);
          }

          if (block.kind === "staffeln") {
            block.subsections.forEach(function (sub) {
              var subWrap = document.createElement("div");
              subWrap.className = "subsection";
              var h3 = document.createElement("h3");
              h3.textContent = sub.title;
              subWrap.appendChild(h3);
              renderItems(subWrap, sub.items);
              sectionEl.appendChild(subWrap);
            });
          } else {
            block.subsections.forEach(function (sub) {
              var subWrap = document.createElement("div");
              subWrap.className = "subsection";
              var h3 = document.createElement("h3");
              h3.textContent = sub.title;
              subWrap.appendChild(h3);
              renderItems(subWrap, sub.items);
              sectionEl.appendChild(subWrap);
            });
            if (block.items.length) {
              var subWrap = document.createElement("div");
              subWrap.className = "subsection";
              renderItems(subWrap, block.items);
              sectionEl.appendChild(subWrap);
            }
          }

          el.content.appendChild(sectionEl);
        });

        el.layout.hidden = false;
        el.content.classList.add("visible");
        el.filter.disabled = false;
        el.reload.disabled = false;
      }

      function setError(msg) {
        el.error.hidden = false;
        el.error.textContent = msg;
        el.loading.style.display = "none";
      }

      function formatDeTs(iso) {
        if (!iso) return "";
        try {
          var d = new Date(iso);
          return d.toLocaleString("de-DE", {
            dateStyle: "medium",
            timeStyle: "short",
          });
        } catch (e) {
          return iso;
        }
      }

      function applyFilter(q) {
        var needle = (q || "").toLowerCase().trim();
        var cards = el.content.querySelectorAll("a.ep-card");
        cards.forEach(function (a) {
          if (!needle) {
            a.classList.remove("hidden");
            return;
          }
          var hay = a.dataset.filter || "";
          a.classList.toggle("hidden", hay.indexOf(needle) === -1);
        });

        if (!needle) {
          el.content.querySelectorAll(".subsection").forEach(function (sub) {
            sub.style.display = "";
          });
          el.content.querySelectorAll(".section-block").forEach(function (sec) {
            sec.style.display = "";
          });
          return;
        }

        el.content.querySelectorAll(".subsection").forEach(function (sub) {
          var visible = sub.querySelector("a.ep-card:not(.hidden)");
          sub.style.display = visible ? "" : "none";
        });
        el.content.querySelectorAll(".section-block").forEach(function (sec) {
          var visible = sec.querySelector("a.ep-card:not(.hidden)");
          sec.style.display = visible ? "" : "none";
        });
      }

      el.filter.addEventListener("input", function () {
        applyFilter(el.filter.value);
      });

      el.reload.addEventListener("click", function () {
        load();
      });

      function load() {
        el.loading.style.display = "block";
        el.error.hidden = true;
        el.layout.hidden = true;
        el.content.classList.remove("visible");
        el.filter.value = "";
        el.filter.disabled = true;
        el.reload.disabled = true;

        var url = apiFetchUrl(
          new URLSearchParams({
            action: "query",
            titles: PAGE_TITLE,
            prop: "revisions",
            rvprop: "content|timestamp",
            format: "json",
            formatversion: "2",
            origin: "*",
          })
        );

        fetch(url)
          .then(function (r) {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.json();
          })
          .then(function (json) {
            var pages = json.query && json.query.pages;
            if (!pages || !pages.length) throw new Error("Keine Seite in der API-Antwort.");
            var page = pages[0];
            if (page.missing) throw new Error('Wiki-Seite "' + PAGE_TITLE + '" fehlt.');
            var rev = page.revisions && page.revisions[0];
            if (!rev || rev.content == null) throw new Error("Kein Seiteninhalt (revisions).");

            var parsed = parseEpisodenWikitext(rev.content);
            render(parsed);

            el.metaBar.innerHTML =
              '<span>Quelle: <a href="' +
              wikiUrl(PAGE_TITLE) +
              '">ManiacWiki · ' +
              PAGE_TITLE +
              "</a></span>" +
              '<span>Stand (letzte Revision): ' +
              formatDeTs(rev.timestamp) +
              "</span>" +
              '<span>Nur API (<code>action=query</code> · <code>rvprop=content|timestamp</code>)</span>';

            el.loading.style.display = "none";
          })
          .catch(function (e) {
            setError(
              "Konnte die Episoden-Seite nicht laden: " +
                (e.message || e) +
                ". Prüfe die Netzwerkverbindung bzw. ob der CORS-Proxy erreichbar ist."
            );
          });
      }

      load();
    })();
  </script>
</body>
</html>
