<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MMM Episoden Links</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      color: #222;
      background: #fafafa;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.6rem;
    }
    p {
      margin: 0 0 16px;
      color: #555;
    }
    .status {
      margin-bottom: 14px;
      font-size: 0.95rem;
      color: #444;
    }
    .toolbar {
      margin-bottom: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #searchInput {
      width: 100%;
      max-width: 480px;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.92rem;
      background: #fff;
    }
    .table-wrap {
      overflow: auto;
      border: 1px solid #ddd;
      background: #fff;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      min-width: max-content;
    }
    th, td {
      padding: 8px 10px;
      border-bottom: 1px solid #eee;
      text-align: left;
      vertical-align: top;
      font-size: 0.92rem;
    }
    th {
      position: sticky;
      top: 0;
      background: #f3f3f3;
      z-index: 1;
    }
    a {
      color: #0b57d0;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .muted {
      color: #999;
    }
  </style>
</head>
<body>
  <h1>MMM Episoden Übersicht</h1>
  <p>Datenquelle: <code>mmm_episoden_links.csv</code></p>
  <div class="status" id="status">Lade CSV...</div>
  <div class="toolbar">
    <input id="searchInput" type="search" placeholder="Suche in allen Spalten…">
  </div>

  <div class="table-wrap">
    <table id="episodesTable">
      <thead><tr id="episodesTableHeadRow"></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    let allRows = [];
    let columnHeaders = [];

    /**
     * Spalten, die zwar in der CSV stehen, aber im UI nicht angezeigt werden sollen.
     * Die Daten bleiben in der CSV erhalten – sie werden nur nicht im Browser exponiert.
     */
    const HIDDEN_COLUMNS = new Set([
      "Download-Link",
      "Download-Link (clean)"
    ]);

    /** Spalten-Überschriften (bekannte Keys); weitere CSV-Spalten erscheinen automatisch. */
    const COLUMN_LABELS = {
      kategorie: "Kategorie",
      episode: "Episode",
      wiki_url: "Wiki (ManiacWiki)",
      "Longplay-Link": "Longplay"
    };

    function columnTitle(key) {
      if (COLUMN_LABELS[key]) return COLUMN_LABELS[key];
      return key.replace(/_/g, " ");
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function parseCsvLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        const next = line[i + 1];

        if (ch === '"' && inQuotes && next === '"') {
          current += '"';
          i++;
          continue;
        }
        if (ch === '"') {
          inQuotes = !inQuotes;
          continue;
        }
        if (ch === "," && !inQuotes) {
          result.push(current);
          current = "";
          continue;
        }
        current += ch;
      }
      result.push(current);
      return result;
    }

    function parseCsv(text) {
      const lines = text.split(/\r?\n/).filter((line) => line.trim() !== "");
      if (lines.length === 0) return { headers: [], rows: [] };

      const headers = parseCsvLine(lines[0]);
      const rows = [];

      for (let i = 1; i < lines.length; i++) {
        const values = parseCsvLine(lines[i]);
        const row = {};
        for (let j = 0; j < headers.length; j++) {
          row[headers[j]] = values[j] || "";
        }
        rows.push(row);
      }
      return { headers, rows };
    }

    function makeLinkCell(url, label) {
      if (!url) return '<span class="muted">-</span>';
      const safeHref = url.replace(/"/g, "&quot;");
      const safeLabel = escapeHtml(label || url);
      // Note: deliberately NOT using rel="noreferrer" here. Some target sites
      // (e.g. the maniac-mansion-mania.com docman download endpoint) perform
      // a referer/hotlink check and refuse the download when no Referer is
      // sent. We keep rel="noopener" for the usual tab-isolation security.
      return '<a href="' + safeHref + '" target="_blank" rel="noopener">' + safeLabel + "</a>";
    }

    function linkLabelFor(url, columnKey) {
      if (columnKey === "Longplay-Link" && /youtube\.com|youtu\.be/i.test(url)) {
        return "\u25B6 YouTube";
      }
      return url;
    }

    function cellHtml(value, columnKey) {
      const v = (value || "").trim();
      if (!v) return '<span class="muted">-</span>';
      if (/^https?:\/\//i.test(v)) return makeLinkCell(v, linkLabelFor(v, columnKey));
      return escapeHtml(v);
    }

    function renderTableHead() {
      const tr = document.getElementById("episodesTableHeadRow");
      tr.innerHTML = columnHeaders
        .map((key) => "<th>" + escapeHtml(columnTitle(key)) + "</th>")
        .join("");
    }

    function renderRows(rows) {
      const tbody = document.querySelector("#episodesTable tbody");
      const html = rows
        .map((row) => {
          const tds = columnHeaders
            .map((key) => "<td>" + cellHtml(row[key], key) + "</td>")
            .join("");
          return "<tr>" + tds + "</tr>";
        })
        .join("");
      tbody.innerHTML = html;
    }

    function applyFilter() {
      const statusEl = document.getElementById("status");
      const query = document.getElementById("searchInput").value.trim().toLowerCase();
      if (!query) {
        renderRows(allRows);
        statusEl.textContent = "Geladen: " + allRows.length + " Einträge.";
        return;
      }

      const filtered = allRows.filter((row) => {
        const haystack = columnHeaders
          .map((key) => row[key] || "")
          .join(" ")
          .toLowerCase();
        return haystack.includes(query);
      });

      renderRows(filtered);
      statusEl.textContent = "Gefiltert: " + filtered.length + " von " + allRows.length + " Einträgen.";
    }

    async function loadTable() {
      const statusEl = document.getElementById("status");

      try {
        const response = await fetch("./mmm_episoden_links.csv");
        if (!response.ok) {
          throw new Error("CSV konnte nicht geladen werden (HTTP " + response.status + ").");
        }

        let csvText = await response.text();
        csvText = csvText.replace(/^\uFEFF/, "");
        const parsed = parseCsv(csvText);
        columnHeaders = parsed.headers.filter((key) => !HIDDEN_COLUMNS.has(key));
        allRows = parsed.rows;

        if (allRows.length === 0) {
          statusEl.textContent = "CSV geladen, aber keine Daten gefunden.";
          return;
        }

        renderTableHead();
        renderRows(allRows);
        statusEl.textContent = "Geladen: " + allRows.length + " Einträge.";
      } catch (err) {
        statusEl.textContent = "Fehler: " + err.message + " Tipp: Seite über einen lokalen Server öffnen (nicht als file://).";
      }
    }

    document.getElementById("searchInput").addEventListener("input", applyFilter);
    loadTable();
  </script>
</body>
</html>
