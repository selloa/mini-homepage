<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MMM History Research</title>
  <style>
    :root {
      --bg: #0e0e12;
      --text: #ece9e4;
      --muted: #9c9690;
      --accent: #d4a853;
      --link: #8ec5ff;
      --card: #1f1f2a;
      --border: rgba(255, 255, 255, 0.1);
      font-family: system-ui, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }
    main {
      max-width: 28rem;
      width: 100%;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 1.25rem;
      letter-spacing: -0.02em;
    }
    h1 span { color: var(--accent); }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    li { margin-bottom: 0.65rem; }
    a.card {
      display: block;
      padding: 1rem 1.1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--link);
      text-decoration: none;
      font-weight: 600;
      transition: border-color 0.15s;
    }
    a.card:hover {
      border-color: var(--accent);
    }
    a.card small {
      display: block;
      margin-top: 0.35rem;
      font-weight: 400;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <h1><span>MMM</span> History Research</h1>
    <ul>
      <li>
        <a class="card" href="episoden-fuehrer.html">
          Episodenführer
          <small>Live aus ManiacWiki (MediaWiki-API).</small>
        </a>
      </li>
      <li>
        <a class="card" href="forum-gepinnte-threads.html">
          Forum – gepinnte Threads
          <small>Übersicht aus <code>research-forum/02-gepinnte-threads.md</code> (statisch).</small>
        </a>
      </li>
      <li>
        <a class="card" href="episoden-links-csv.html">
          Episodenlinks (CSV)
          <small>Tabelle aus <code>mmm_episoden_links.csv</code> (dynamisch geladen).</small>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
